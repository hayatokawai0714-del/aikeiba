name: racing-ai-schema-guard

on:
  push:
    paths:
      - "racing_ai/**"
      - ".github/workflows/racing-ai-schema-guard.yml"
  pull_request:
    paths:
      - "racing_ai/**"
      - ".github/workflows/racing-ai-schema-guard.yml"

jobs:
  schema-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: racing_ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Compile check
        run: |
          python -m compileall src/aikeiba/common/run_summary.py src/aikeiba/evaluation/run_summary_linker.py src/aikeiba/evaluation/comparison_report.py
      - name: Run schema tests
        run: |
          pytest -q tests/test_run_summary_schema.py
